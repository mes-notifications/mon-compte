<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
const offres = [
    {url: 'https://ads.adextrem.com/delivery/directlink.php?slot=23800&keypass=61scx1cv&email=%EMAIL%&tracker1=mes-notifications&tracker2=agentic', poids: 33},
    {url: 'https://www.meilleurrdv.fr/voir-profil/?src=tmii3&pf_email=%EMAIL%&sbsrc1=mes-notifications&sbsrc2=agentic', poids: 33},
    {url: 'https://pdtrcks.com/v1/redirect/40221?clickid=&email=%EMAIL%&utm_term=mes-notifications', poids: 33},
];
const email = new URLSearchParams(window.location.search).get('u') || '';
const totalPoids = offres.reduce((sum, o) => sum + o.poids, 0);
let random = Math.floor(Math.random() * totalPoids) + 1;
let cumul = 0;
let url = offres[0].url;
for (const offre of offres) {
    cumul += offre.poids;
    if (random <= cumul) { url = offre.url; break; }
}
window.location.href = url.replace('%EMAIL%', encodeURIComponent(email));
</script>
</body>
</html>
